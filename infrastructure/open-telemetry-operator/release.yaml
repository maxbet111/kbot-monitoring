apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opentelemetry-operator
  namespace: monitoring
spec:
  interval: 10m
  chart:
    spec:
      chart: opentelemetry-operator
      sourceRef:
        kind: HelmRepository
        name: open-telemetry
        namespace: monitoring
  values:
    admissionWebhooks:
      # Замість enabled використовуємо create
      create: true
      certManager:
        enabled: false
      # Перетворюємо булеве значення на об'єкт, як просить схема
      autoGenerateCert:
        enabled: true

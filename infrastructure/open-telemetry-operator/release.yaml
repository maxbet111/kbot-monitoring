apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opentelemetry-operator
  namespace: monitoring
spec:
  interval: 10m
  chart:
    spec:
      chart: opentelemetry-operator
      sourceRef:
        kind: HelmRepository
        name: open-telemetry
        namespace: monitoring
  values:
    # Вимикаємо admission webhooks, щоб оператор працював у dev-кластері без Cert-Manager
    admissionWebhooks:
      create: false

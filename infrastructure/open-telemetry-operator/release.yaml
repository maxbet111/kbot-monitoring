apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opentelemetry-operator
  namespace: monitoring
spec:
  interval: 10m
  chart:
    spec:
      chart: opentelemetry-operator
      sourceRef:
        kind: HelmRepository
        name: open-telemetry
        namespace: monitoring
  values:
    admissionWebhooks:
      enabled: true
      # Вимикаємо залежність від cert-manager
      certManager:
        enabled: false
      # Змушуємо Helm самому згенерувати сертифікати для вебхука
      autoGenerateCert: true

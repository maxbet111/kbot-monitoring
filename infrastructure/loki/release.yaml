apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: monitoring
spec:
  interval: 10m
  chart:
    spec:
      chart: loki
      version: "5.48.0"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: monitoring
  values:
    deploymentMode: SingleBinary

    loki:
      auth_enabled: false
      commonConfig:
        replication_factor: 1
      storage:
        type: filesystem
      schemaConfig:
        configs:
          - from: "2024-01-01"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: index_
              period: 24h

    singleBinary:
      replicas: 1
      persistence:
        enabled: false
      # Створюємо тимчасовий буфер, куди Loki зможе вільно писати
      extraVolumes:
        - name: loki-scratch
          emptyDir: {}
      extraVolumeMounts:
        - name: loki-scratch
          mountPath: /var/loki

    resultsCache:
      enabled: false
    chunksCache:
      enabled: false

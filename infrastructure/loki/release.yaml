apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: monitoring
spec:
  interval: 10m
  chart:
    spec:
      chart: loki
      version: "5.48.0"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: monitoring
  values:
    # Перемикаємо архітектуру з мікросервісів на один под
    deploymentMode: SingleBinary

    loki:
      auth_enabled: false
      commonConfig:
        replication_factor: 1
      storage:
        type: filesystem
      schemaConfig:
        configs:
          - from: "2024-01-01"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: index_
              period: 24h

    # Налаштування для монолітного пода
    singleBinary:
      replicas: 1
      persistence:
        enabled: false # не створюємо важкі хмарні диски

    # Вимикаємо непотрібні кеші, щоб не їсти оперативну пам'ять кластера
    resultsCache:
      enabled: false
    chunksCache:
      enabled: false

apiVersion: opentelemetry.io/v1beta1
kind: Namespace
metadata:
  name: monitoring
---
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: kbot-collector
  namespace: monitoring
spec:
  mode: deployment # <--- ЯВНО ДОДАЄМО ЦЕЙ РЯДОК ДЛЯ ВЕБХУКА
  config:
    receivers:
      otlp:
        protocols:
          grpc:
          http:
    processors:
      batch:
    exporters:
      prometheus:
        endpoint: "0.0.0.0:8889"
        namespace: "kbot"
      logging:
        verbosity: detailed
    service:
      pipelines:
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [prometheus]
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [logging]
